name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  RUSTFLAGS: "-D warnings"
  CARGO_INCREMENTAL: "0"
  CARGO_TERM_COLOR: always
  CARGO_NET_RETRY: 5

jobs:
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { submodules: recursive }
      - uses: dtolnay/rust-toolchain@nightly
        with: { components: rustfmt }
      - run: cargo +nightly fmt --all -- --check

  clippy:
    name: clippy (feature powerset)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { submodules: recursive }
      - uses: dtolnay/rust-toolchain@stable
        with: { components: clippy }
      - uses: taiki-e/install-action@cargo-hack
      - run: cargo hack clippy --feature-powerset --no-dev-deps -- -D warnings

  test:
    name: test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with: { submodules: recursive }
      - uses: dtolnay/rust-toolchain@stable
      - uses: taiki-e/install-action@cargo-nextest
      - run: cargo nextest run --workspace --all-features
      - run: cargo test --doc --workspace --all-features

  msrv:
    name: MSRV (1.85)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { submodules: recursive }
      - uses: dtolnay/rust-toolchain@1.85
      - run: cargo +1.85 check --workspace --all-features

  cross-check:
    name: cross-check (${{ matrix.target }})
    strategy:
      fail-fast: false
      matrix:
        target:
          - aarch64-unknown-linux-gnu
          - armv7-unknown-linux-gnueabihf
          - wasm32-unknown-unknown
          - aarch64-linux-android
          - armv7-linux-androideabi
          - aarch64-apple-ios
          - x86_64-apple-ios
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { submodules: recursive }
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: cargo check
        run: |
          if [ "${{ matrix.target }}" = "wasm32-unknown-unknown" ]; then
            # piccle-validate depends on jsonschema -> getrandom, which doesn't
            # support wasm32-unknown-unknown. Only render-path crates need to
            # compile for WASM. See AGENTS.md §5.10 portability matrix.
            cargo check -p piccle-core -p piccle-dsp -p piccle-render \
              --target ${{ matrix.target }}
          else
            cargo check --workspace --all-features --target ${{ matrix.target }}
          fi

  audit:
    name: cargo-audit + cargo-deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { submodules: recursive }
      - uses: taiki-e/install-action@cargo-deny
      - uses: taiki-e/install-action@cargo-audit
      - run: cargo deny check
      - run: cargo audit

  fuzz-smoke:
    name: fuzz crate compiles
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { submodules: recursive }
      - uses: dtolnay/rust-toolchain@nightly
      - run: cargo check --manifest-path crates/piccle-fuzz/Cargo.toml

  docs:
    name: rustdoc
    runs-on: ubuntu-latest
    env:
      RUSTDOCFLAGS: "--cfg docsrs -D warnings"
    steps:
      - uses: actions/checkout@v4
        with: { submodules: recursive }
      - uses: dtolnay/rust-toolchain@nightly
      - run: cargo +nightly doc -Zunstable-options --no-deps --workspace --all-features

  typos:
    name: spell check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { submodules: recursive }
      - uses: crate-ci/typos@v1.20

  dprint:
    name: format check (markdown/yaml/toml/json)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { submodules: recursive }
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo install dprint --locked
      - run: dprint check

  gitleaks:
    name: secrets scanning
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { submodules: recursive, fetch-depth: 0 }
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  conformance:
    name: spec conformance
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { submodules: recursive }
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo xtask conformance --piccle-spec piccle-spec
