name: CI

permissions:
  contents: read

on:
  push:
    branches: [main]
  pull_request:

env:
  RUSTFLAGS: "-D warnings"
  CARGO_INCREMENTAL: "0"
  CARGO_TERM_COLOR: always
  CARGO_NET_RETRY: 5

jobs:
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with: { submodules: recursive }
      - uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c
        with: { toolchain: nightly, components: rustfmt }
      - run: cargo +nightly fmt --all -- --check

  clippy:
    name: clippy (feature powerset)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with: { submodules: recursive }
      - uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c
        with: { toolchain: stable, components: clippy }
      - uses: taiki-e/install-action@25f25a6eff908c77b40880d0b1f5d2a032b6e75a
        with: { tool: cargo-hack }
      - run: cargo hack clippy --feature-powerset --no-dev-deps -- -D warnings

  test:
    name: test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with: { submodules: recursive }
      - uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c
        with: { toolchain: stable }
      - uses: taiki-e/install-action@25f25a6eff908c77b40880d0b1f5d2a032b6e75a
        with: { tool: cargo-nextest }
      - run: cargo nextest run --workspace --all-features
      - run: cargo test --doc --workspace --all-features

  coverage:
    name: library coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with: { submodules: recursive }
      - uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c
        with: { toolchain: stable, components: llvm-tools-preview }
      - uses: taiki-e/install-action@25f25a6eff908c77b40880d0b1f5d2a032b6e75a
        with: { tool: cargo-nextest }
      - uses: taiki-e/install-action@25f25a6eff908c77b40880d0b1f5d2a032b6e75a
        with: { tool: cargo-llvm-cov }
      - run: >-
          cargo llvm-cov nextest --workspace --all-features
          --ignore-filename-regex 'xtask/' --fail-under-lines 90

  msrv:
    name: MSRV (1.85)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with: { submodules: recursive }
      - uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c
        with: { toolchain: "1.85" }
      - run: cargo +1.85 check --workspace --all-features

  cross-check:
    name: cross-check (${{ matrix.target }})
    strategy:
      fail-fast: false
      matrix:
        target:
          - aarch64-unknown-linux-gnu
          - armv7-unknown-linux-gnueabihf
          - wasm32-unknown-unknown
          - aarch64-linux-android
          - armv7-linux-androideabi
          - aarch64-apple-ios
          - x86_64-apple-ios
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with: { submodules: recursive }
      - uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c
        with:
          toolchain: stable
          targets: ${{ matrix.target }}
      - name: cargo check
        run: |
          if [ "${{ matrix.target }}" = "wasm32-unknown-unknown" ]; then
            # Validation uses std and is application-processor-only. The core
            # document and allocation-free render crates must compile on WASM.
            cargo check -p piccle-core -p piccle-dsp -p piccle-render \
              --target ${{ matrix.target }}
          else
            cargo check --workspace --all-features --target ${{ matrix.target }}
          fi

  audit:
    name: cargo-audit + cargo-deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with: { submodules: recursive }
      - uses: taiki-e/install-action@25f25a6eff908c77b40880d0b1f5d2a032b6e75a
        with: { tool: cargo-deny }
      - uses: taiki-e/install-action@25f25a6eff908c77b40880d0b1f5d2a032b6e75a
        with: { tool: cargo-audit }
      - run: cargo deny check
      - run: cargo audit

  fuzz-smoke:
    name: fuzz crate compiles
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with: { submodules: recursive }
      - uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c
        with: { toolchain: nightly }
      - run: cargo check --manifest-path crates/piccle-fuzz/Cargo.toml

  docs:
    name: rustdoc
    runs-on: ubuntu-latest
    env:
      RUSTDOCFLAGS: "--cfg docsrs -D warnings"
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with: { submodules: recursive }
      - uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c
        with: { toolchain: nightly }
      - run: cargo +nightly doc -Zunstable-options --no-deps --workspace --all-features

  typos:
    name: spell check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with: { submodules: recursive }
      - uses: taiki-e/install-action@25f25a6eff908c77b40880d0b1f5d2a032b6e75a
        with: { tool: typos-cli }
      - run: typos

  dprint:
    name: format check (markdown/yaml/toml/json)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with: { submodules: recursive }
      - uses: taiki-e/install-action@25f25a6eff908c77b40880d0b1f5d2a032b6e75a
        with: { tool: dprint }
      - run: dprint check

  gitleaks:
    name: secrets scanning
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with: { submodules: recursive, fetch-depth: 0 }
      - name: install Gitleaks 8.30.1
        shell: bash
        run: |
          archive="${RUNNER_TEMP}/gitleaks_8.30.1_linux_x64.tar.gz"
          curl --fail --location --proto '=https' --tlsv1.2 \
            --output "${archive}" \
            https://github.com/gitleaks/gitleaks/releases/download/v8.30.1/gitleaks_8.30.1_linux_x64.tar.gz
          echo "551f6fc83ea457d62a0d98237cbad105af8d557003051f41f3e7ca7b3f2470eb  ${archive}" \
            | sha256sum --check --strict
          tar --extract --gzip --file "${archive}" --directory "${RUNNER_TEMP}" gitleaks
          echo "${RUNNER_TEMP}" >> "${GITHUB_PATH}"
      - run: gitleaks git --redact --verbose

  conformance:
    name: spec conformance
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with: { submodules: recursive }
      - uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c
        with: { toolchain: stable }
      - run: python3 piccle-spec/scripts/validate.py
      - run: cargo conformance --piccle-spec piccle-spec
